# Opcjonalnie: sekret VERCEL_DEPLOY_HOOK — wtedy każdy push na main wywołuje produkcyjny deploy na Vercel.
# Vercel: Project → Settings → Git → Deploy Hooks → Create Hook (branch: main, Production) → skopiuj URL.
# GitHub: repo → Settings → Secrets and variables → Actions → New repository secret → VERCEL_DEPLOY_HOOK.

name: Trigger Vercel production deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  vercel-hook:
    if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$HOOK"
          echo "OK: Vercel deploy hook wywołany."
